name: Build Firmware

on:
  push:
    branches: [ main, develop ]
    paths: [ 'firmware/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'firmware/**' ]

jobs:
  build-arduino:
    runs-on: ubuntu-latest
    name: Build with Arduino IDE

    steps:
    - uses: actions/checkout@v4

    - name: Setup Arduino IDE
      uses: arduino/setup-arduino-cli@v1

    - name: Install ESP32 core
      run: |
        arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_dev_index.json
        arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_dev_index.json

    - name: Install required libraries
      run: |
        arduino-cli lib install "SparkFun AS7265x Arduino Library"
        arduino-cli lib install "Adafruit ST7735 and ST7789 Library"
        arduino-cli lib install "Adafruit GFX Library"

    - name: Compile firmware
      run: |
        arduino-cli compile --fqbn esp32:esp32:adafruit_feather_esp32v2:FlashFreq=80 firmware/ndvi_handheld/ndvi_handheld.ino

  build-platformio:
    runs-on: ubuntu-latest
    name: Build with PlatformIO

    steps:
    - uses: actions/checkout@v4

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Build firmware
      run: pio run
      working-directory: firmware/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-build-${{ github.sha }}
        path: firmware/.pio/build/*/firmware.*
        retention-days: 30
